# General
windowrule = float on, match:class ^(yad|nm-connection-editor|pavucontrol-qt|xfce-polkit|hyprpolkitagent|kvantummanager|qt5ct|feh|Viewnior|Gpicview|Gimp|MPlayer|qemu|Qemu-system-x86_64|mpv)$
windowrule = center on, match:class ^(yad|nm-connection-editor|pavucontrol-qt|xfce-polkit|hyprpolkitagent|kvantummanager|qt5ct|feh|Viewnior|Gpicview|Gimp|MPlayer|qemu|Qemu-system-x86_64|mpv)$
windowrule = opaque on, match:title ^(Picture-in-Picture)$
windowrule = opaque on, match:class ^(com.obsproject.Studio)$
# windowrule = suppress_event maximize fullscreen on, match:class ^(code-insiders-url-handler)$

# floating windows
windowrule = float on, match:class ^(zenity)$
windowrule = float on, match:title ^(New Text Note — Okular)$
windowrule = float on, match:class ^(file_progress)$
windowrule = float on, match:class ^(confirm)$
windowrule = float on, match:class ^(dialog)$
windowrule = float on, match:class ^(download)$
windowrule = float on, match:class ^(notification)$
windowrule = float on, match:class ^(error)$
windowrule = float on, match:class ^(splash)$
windowrule = float on, match:class ^(confirmreset)$
windowrule = float on, match:title ^(Open File|Save File|xdg-desktop-portal-gtk)$
windowrule = size 75% 75%, match:title ^(Open File|Save File|xdg-desktop-portal-gtk)$
windowrule = center on, match:title ^(Open File|Save File|xdg-desktop-portal-gtk)$
# windowrule = size 0 0, match:title ^()$, match:class ^()$, match:xwayland 1
windowrule = float on, match:title ^(branchdialog)$
windowrule = float on, match:class ^(Lxappearance)$
windowrule = float on, match:class ^(viewnior)$
windowrule = float on, match:class ^(feh)$
windowrule = float on, match:class ^(blueman-manager)$
windowrule = float on, match:class ^(nm-connection-editor)$
windowrule = float on, match:class ^(file-roller)$
windowrule = float on, match:title ^(Media viewer)$
windowrule = float on, match:title ^(Volume Control)$
windowrule = float on, match:title ^(Picture-in-Picture)$

# Remmina
# windowrule = suppress_event maximize fullscreen on, match:class ^(org.remmina.Remmina)$

# Hacking software
# AVD
windowrule = float on, match:title ^(Emulator)$
windowrule = center on, match:title ^(Emulator)$
windowrule = move 100 100, match:title ^(Emulator)$
# windowrule = suppress_event maximize fullscreen on, match:title ^(Android\ Emulator.*)$
# windowrule = size 30% 70%, match:title ^(Android Emulator.*)$
# Ghidra
windowrule = center on, match:title ^(Java)$
windowrule = tile on, match:class ^(ghidra-Ghidra)$, match:title ^(Ghidra.*)$
windowrule = tile on, match:class ^(ghidra-Ghidra)$, match:title ^(CodeBrowser.*)$

# Force tile
windowrule = tile on, match:class ^(qemu-system-x86_64)$
windowrule = tile on, match:class ^(Spotify)$

# czkawka
windowrule = center on, match:class ^(czkawka_gui)$, match:title ^(Scanning)$
windowrule = size 30% 30%, match:class ^(czkawka_gui)$, match:title ^(Scanning)$

# FlameShot
windowrule = float on, match:class ^(flameshot)$, match:title ^(flameshot)$
windowrule = monitor 0, match:class ^(flameshot)$, match:title ^(flameshot)$
windowrule = move 0 0, match:class ^(flameshot)$, match:title ^(flameshot)$
windowrule = size 3280 1080, match:class ^(flameshot)$, match:title ^(flameshot)$

# Launchers
layerrule = no_anim on, match:namespace walker
windowrule = opacity 1.0 0.4, match:class ^(Rofi)$
windowrule = float on, match:class ^(Rofi)$
windowrule = center on, match:class ^(Rofi)$
windowrule = no_anim on, match:class ^(Rofi)$
windowrule = no_blur on, match:class ^(Rofi)$
windowrule = no_shadow on, match:class ^(Rofi)$
windowrule = no_max_size on, match:class ^(Rofi)$

# Clipboard manager (clipse)
windowrule = float on, match:class ^(clipse-gui)$
windowrule = stay_focused on, match:class ^(clipse-gui)$

# swaync
windowrule = float on, match:class ^(swaync)$
windowrule = opacity 0.75, match:class ^(swaync)$

# jetbrains
windowrule = center on, match:class ^(.*jetbrains.*)$, match:title ^(Confirm Exit|Open Project|win*|splash)$
windowrule = size 640 400, match:class ^(.*jetbrains.*)$, match:title ^(splash)$
windowrule = no_initial_focus on, match:class ^(.*jetbrains.*)$, match:title ^(win.*)$
windowrule = no_focus on, match:class ^(.*jetbrains.*)$, match:title ^(win.*)$

# Screen sharing
windowrule = float on, match:title ^(Firefox — Sharing Indicator)$
windowrule = move 100% 20%, match:title ^(Chromium — Sharing Indicator)$
windowrule = float on, match:title ^(.*is sharing (your screen|a window)\.)$
windowrule = move 100% 20%, match:title ^(.*is sharing (your screen|a window)\.)$

# Onlyoffice
windowrule = tile on, match:class ^(ONLYOFFICE Desktop Editors)$

# bitwarden auth float
windowrule = float on, match:class ^(chrome-.*-Default)$

# Dont idleinhibit fullscreen
windowrule = idle_inhibit fullscreen, match:fullscreen true

# Communication
# Viber
windowrule = float on, match:class ^(com.viber.Viber)$, match:title ^(ViberPC)$
windowrule = move 1610 55, match:title ^(ViberPC)$, match:class ^(com.viber.Viber)$
# Zoom
windowrule = float on, match:class ^(zoom)$, match:title ^(Meeting Chat)$
# xwaylandvideobridge
windowrule = opacity 0.0 override 0.0 override 0.0 override, match:class ^(xwaylandvideobridge)$
windowrule = no_anim on, match:class ^(xwaylandvideobridge)$
windowrule = no_initial_focus on, match:class ^(xwaylandvideobridge)$
windowrule = max_size 1 1, match:class ^(xwaylandvideobridge)$
windowrule = no_blur on, match:class ^(xwaylandvideobridge)$
# Inhibit
windowrule = idle_inhibit focus, match:class ^(zoom)$
windowrule = idle_inhibit focus, match:title ^(.*Zoom.*|Meet –.*)$

# Python libraries
windowrule = float on, match:class ^(Matplotlib)$

# Background apps
windowrule = workspace special:backgroundappsrogcontrolcenter silent, match:initial_title ^(ROG Control)(.*)$
windowrule = workspace special:backgroundappsvalent silent, match:class ^(valent)$

# Polkit force focus
windowrule = stay_focused on, match:class ^(hyprpolkitagent)$
